body:
  text: 孫盛晉陽秋荀顗顗字景倩幼為姊夫陳群所異博學洽聞意思慎密司馬宣王見顗奇之曰荀令君之子也近見袁侃亦曜卿之子也擢拜散騎侍郎顗佐命晉室位至太尉封臨淮康公嘗難鍾會易無互體見稱於世顗弟粲字奉倩三國魏志荀彧傳注諸葛亮有星赤而芒角自東北西南流投於亮營三投再還往大還小俄而亮卒蜀志諸葛亮傳注姜維盛以永和初從安西將軍平蜀見諸故老乃姜維既降之後密與劉禪表疏說欲偽服事鍾會因殺之以復蜀土會事不捷遂至泯滅蜀人於今傷之蜀志姜維傳注鄭袤泰子袤字材叔泰與華歆荀攸善見袤曰鄭公業為不亡矣初為臨淄侯文學稍遷至光祿大夫泰始七年以袤為司空固辭不受終於家子默字思玄魏志鄭渾傳注羊祜抗與羊祜推僑札之好抗嘗遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之于時以為華元子反復見於今吳志陸抗傳注衛瓘瓘字伯玉清貞有明理少為傅嘏所知弱冠為尚書郎遂歷位內外為晉尚書令司空太保惠帝初輔政為楚王瑋所害魏志衛顗傳注稽康呂安正元二年司馬文王反自樂嘉殺稽康呂安魏志王粲傳注孫登稽康見孫登登對之長嘯逾時不言康辭還曰先生竟無言乎登曰惜哉魏志王粲傳注王濬濬收其圖籍領州四郡三十二縣三百一十三戶五十二萬吏三萬二千兵二十三萬男女口二百三十萬米穀二百八十萬斛船五十餘艘後宮五千餘人吳志孫皓傳注夏侯佐泰始二年高安鄉侯夏侯佐卒惇之孫也嗣絕詔曰惇魏之元功勳書竹帛昔庭堅不祀猶或悼之況朕受禪於魏而可忘其功臣哉宜擇近屬劭封之魏志夏侯惇傳注胡威威字伯虎少有志尚厲操清白質之為荊州也威自京都省之家貧無車馬僮僕威自驅驢單行拜見父停廄中十餘日告歸臨辭質賜其絹一匹為道路糧威跪曰大人清白不審於何得此絹質曰是吾俸祿之餘故以為汝糧耳威受之辭歸每至客舍自放驢取樵炊爨食畢復隨旅進道往還如是質帳下都督素不相識先其將歸請假還家陰資裝百餘里邀之因與為伴每事佐助經營之又少進飲食行數百里威疑之密誘問乃知其都督也因取向所賜絹荅謝而遣之後因他信具以白質質杖其都督一百除吏名其父子清慎如此於是名譽著聞歷位宰牧晉武帝賜見論邊事語及平生帝嘆其父清謂威曰卿清孰與父清威對曰臣不如也帝曰何以為不如對曰臣父清恐人知臣清恐人不知是臣不如者遠也官至前將軍青州刺史大康元年卒追贈鎮東將軍威弟熊字季象征南將軍威子奕字次孫平東將軍並以潔行垂名魏志胡質傳注李胤敏子追求敏出塞越二十餘年不娶州里徐邈責之曰不孝莫大於無後何可終身不娶乎乃娶妻生子胤而遣妻常如居喪之禮不勝憂數年而卒胤生不識父母不知存亡設主奉之由是知名仕至司徒魏志公孫度傳注劉弘劉弘字叔和熙之弟也弘與晉世祖同年居同里以舊恩屢登顯位自靖至弘世不曠名而有政事才晉西朝之末弘為車騎大將軍開府荊州刺史假節都督荊交廣州諸軍事封新城郡公其在江漢值王室多難得專命一方盡其器能推誠群下厲以公義簡刑獄務農桑每有興發手書郡國丁寧疑密莫不感悅顛倒奔赴咸曰得劉公一紙書賢於十部從事也時帝在長安弘得選用宰守徵士武陵伍朝高尚其事牙門將皮初有勳江漢弘上朝為零陵太守初為襄陽太守詔書以襄陽顯郡初資名輕淺以弘婿夏侯陟為襄陽弘曰夫統天下者當與天下同心治一國者當與一國推實吾統荊州十郡安得十女婿然後為治哉乃表陟姻親舊制不得相監臨事初勳宜見酬報聽之眾益服其公當廣漢太守辛冉以天子蒙塵四方雲擾進從橫之計於弘弘怒斬之時人莫不稱善魏志劉馥傳注劉喬喬有贊世志力惠帝末為豫州刺史喬冑胤丕顯貴盛至今魏志劉廙傳注孫楚孫盛孫綽楚鄉人王濟豪俊公子也為本州大中正訪問關求楚品狀濟曰此人非卿所能名自狀之曰天才英博亮拔不群楚位至討虜護軍馮翊太守楚子洵潁川太守洵子盛字安國給事中祕書監盛從父弟綽字興公廷尉正楚及盛綽並有文藻盛又善言名理諸所論著並傳於世魏志劉放傳注王湛王承王述王坦之湛字處仲汝南太守湛子承字安期東海內史承子述字懷祖尚書令衛將軍述子坦之字文度北中郎將徐兗二州刺史昶諸子中湛最有德譽而承亦自為名士述及坦之並顯名於世為時盛門云魏志王昶傳注引晉書云自湛以下見晉陽秋也荀崧荀羨崧少有志操雅好文學孝義和愛在朝恪勤位至左光祿大夫開府儀同三司崧子羨字令則清和有才尚公主少歷顯位年二十八為北中郎將徐兗二州刺史假節都督徐兗青三州諸軍事在任十年解職卒於家追贈驃騎將軍羨孫伯子今御史中丞也魏志荀彧傳注譙周詔曰朕甚悼之賜朝服一具衣一襲錢十五萬周息熙上言周臨終屬熙曰久抱疾未曾朝見若國恩賜朝服衣物者勿以加身當還舊墓道險行難豫作輕棺殯歛已畢上還所賜曰還衣服給棺直蜀志譙周傳注譙秀秀性清靜不交於世知將大亂豫絕人事從兄弟及諸親里不與相見州郡辟命及李雄盜蜀安車徵秀又雄叔父驤驤子壽辟命皆不應常冠鹿皮躬耕山藪永和三年安西將軍桓溫平蜀表薦秀曰臣聞大朴既虧則高尚之標顯道喪時昏則忠貞之義彰故有洗耳投淵以振玄邈之風亦有秉心矯迹以惇在三之節是以上代之君莫不崇重斯軌所以篤俗訓民靜一流競伏惟大晉應符御世運無常通時有屯蹇神州邱墟三方圯裂兔罝絕響於中林白駒無聞於空谷斯有識之所悼心大雅之所嘆息者也陛下聖德嗣興方恢天緒臣昔奉役事有事西土鯨鯢既縣思宣大化訪諸故老搜揚潛逸庶武羅於羿浞之墟想土蠋於亡齊之境竊聞巴西譙秀植操貞固抱德肥遁揚清渭波于時皇極遘道消之會群黎蹈顛沛之艱中華有顧瞻之哀幽谷無遷喬之望凶命屢招姦戌仍適身寄虎吻危同朝露而能抗節玉立誓不降辱杜門絕迹不面偽庭進免龔勝亡身之禍退無薛方詭對之譏雖園綺之樓商洛管寧之默遼海方之於秀殆無以過於今西土以為美談夫旌德禮賢化道之所先崇表殊節聖哲之上務方今六合未康豺狼當路遣黎偷簿義聲弗聞益宜振起道義之徒以敦流遁之弊若秀蒙蒲帛之徵足以鎮靜頹風軌訓囂俗幽遐仰流九服知化矣及蕭敬叛避難宕渠川中鄉人宗族馮依者以百數秀年八十眾人以其篤老欲代之負擔秀拒曰各有老弱當先營救吾氣力自足堪此不以垂朽之年累諸君也後十餘年卒於家蜀志譙周傳注陸玩玩器量淹雅位至司空追贈太尉吳志陸瑁傳注葛衡吳有葛衡字思真明達天官能為機巧作渾天使地居中以機動之天轉而地止以上應晷度吳志趙達傳注高祖宣帝宣帝天姿傑邁有英雄之略世說容止篇注諸葛亮寇於郿據渭水南原詔使高祖拒之亮善撫馭又戎政嚴明且僑軍遠征糧道艱澀利在野戰朝廷每聞其出欲以不戰屈之高祖亦以為然而擁大軍禦侮於外不宜遠露怯弱之形以虧大勢故秣馬坐甲每見吞併之威亮雖挑戰或遺高祖巾幗巾幗婦女之飾欲以冀怒獲曹咎之利朝廷慮高祖不勝忿憤而衛尉辛毗骨鯁之臣帝乃使毗杖節為高祖軍司馬亮果復挑戰高祖乃奮怒將出應之毗杖節中門而立高祖乃止將士聞見益加勇銳識者以為人臣雖擁眾千萬而屈於王人大略深長皆如此之類也世說方正篇注孝惠帝初惠帝之為太子咸謂不能親政事衛瓘每欲陳啟廢之而未敢也後因會醉遂跪床前曰臣欲有所啟帝曰公所欲言者何邪瓘欲言而復止者三因以手撫床曰此坐可惜帝意乃悟因謬曰公真大醉也帝後悉召東宮官屬大會令左右齎尚書處事以示太子令處決太子不知所對賈妃以問外人代太子對多引古詞義給使張弘曰太子不學陛下所知宜以見事斷不宜引書也妃從之弘具草奏令太子書呈帝大悅以示瓘於是賈充語妃曰衛瓘老奴幾敗汝家妃由是怨瓘後遂殺之世說規箴篇注廢帝海西公太和六年閏十月熒惑守太微端門十一月大司馬桓溫廢帝為海西公世說言語篇注海西公諱奕字延陵成帝子也興寧中即位少同閹人之疾使宮人與左右淫通生子大司馬自廣陵還姑孰過京都以皇太后令廢帝為海西公世說排調篇注齊王攸字大猷文帝第二子孝敬忠肅清和平允親賢下士仁惠好施能屬文善尺牘初荀勗馮紞為武帝親幸攸惡勗之佞勗懼攸或嗣立必誅已且攸甚得眾心朝賢景附會帝有疾攸及皇太子入問訊朝士皆屬目於攸而不在太子至是勗從容曰陛下萬年後太子不得立也帝曰何故勗曰百寮內外皆歸心於齊王太子安得立乎陛下試召齊王歸國必舉朝謂之不可若然則臣言徵矣侍中馮紞又曰陛下必欲建諸侯成五等宜從親始親莫若齊王帝從之下詔使攸之國攸聞勗紞間己憂忿不知所為入辭出歐血而死薨帝哭之慟馮紞侍曰齊王名過其實而天下歸之今日薨殞陛下何哀之甚帝乃止劉毅聞之故終身稱疾焉世說品藻篇注趙王倫趙王倫篡位樂廣與滿奮崔隨進璽綬世說品藻篇注葛旟齊王起義轉長史既克趙王倫與董艾等專執威權冏敗見誅世說方正篇注司馬丞字元敬譙王遜子也為中宗相州刺史路過武昌王敦與燕會酒酣謂丞曰大王篤實佳士非將御之才對曰焉知鉛刀不能一割乎敦將謀逆召丞為軍司馬丞嘆曰吾其死矣地荒民解勢孤援絕赴君難忠也死王事義也死忠與義又何求焉乃馳檄諸郡丞赴義敦遣從母弟魏乂攻丞王廙使賊迎之薨於車敦既滅追贈驃騎謚曰愍王世說仇隙篇注王祥祥少有美德行世說德行篇注後母數譖祥屢以非禮使祥弟覽輒與祥俱又虐使祥婦覽妻亦趨而共之母患方盛寒冰凍母欲生魚祥解衣將剖冰求之會有處水小解魚出世說同上陳騫陳騫字休淵司徒第二子無謇諤風滑稽而多智仕至大司馬世說方正篇注呂安安字中悌東平人冀州刺史招之第二子志量開曠有拔俗風氣世說簡傲篇注稽康初康與東平呂安親善安嫡兄遜淫安妻徐氏安欲告遜遣妻以咨於康康喻而抑之遜內不自安陰告安撾母表求徙邊安當徙訴自理辭引康世說雅量篇注張華華博覽洽聞無不貫綜世祖嘗問漢事及建章千門萬戶華畫地成圖應對如流張安世不能過也世說言語篇注山濤濤雅素恢達度量宏遠心存事外而與時俛仰嘗與阮籍稽康諸人著忘言之契至於群子屯蹇於世濤獨保浩然之度世說賢緩篇注王戎戎為兒童鍾會異之世說賞譽篇注戎年十五隨父渾在郎舍阮籍見而悅之每過渾俄次在戎室久之乃謂渾濬沖清尚非卿倫也戎嘗詣籍共飲而劉昶在坐不與焉昶無恨色既而戎問籍曰彼為誰也曰劉公榮也濬沖曰勝公榮者故與酒不如公榮者不可不與酒唯公榮可不與酒世說簡傲篇注戎為豫州刺史遭母憂性至孝不拘禮制飲酒食肉或觀棊奕而容貌毀悴杖而後起時汝南和嶠亦名士也以禮法自持處大憂量米而食然顦顇哀毀不逮戎也世說德行篇注世祖及時談以此貴戎也世說同上司隸校尉劉毅奏南郡太守劉肇以布五十疋雜物遺前豫州刺史王戎請檻車徵付廷尉治罪除名終身戎以書未達不坐世說雅量篇注楷與王戎俱加儀同三司世說同上戎多殖財賄常若不足世說儉嗇篇注王衍夷甫父乂有簡書將免官夷甫年十七見所繼從舅羊祜申陳事狀辭甚俊偉祜不然之夷甫拂衣而起祜顧謂賓客曰此人必將以盛名處當世大位然敗俗傷化者必此人也世說識鑒篇注夷甫善施舍父時有假貸者皆與焚券未嘗言貨利之事世說規箴篇注惠帝時大尉王夷甫言於選者以帝澄為荊州刺史從弟敦為青州刺史澄敦俱詣太尉辭太尉謂曰今王室將卑故使弟等居齊楚之地外可以建霸業內足以匡帝室所望於二弟也世說簡傲篇注夷甫將為石勒所殺謂人曰吾等若不祖尚浮虛不至於此世說輕詆篇注和嶠世祖疑惠帝不可承繼大業遣和嶠荀勗往觀察之既見勗稱嘆曰太子德更進茂不同於故嶠曰皇太子聖質如初此陛下家事非臣所盡天下聞之莫不稱嶠為忠而欲灰滅勗也世說方正篇注樂廣尚書今衛瓘見廣曰昔何平叔諸人沒常謂清言盡矣今復聞之於君世說賞譽篇注樂廣善以約言厭人心其所不知默如也太尉王夷甫光祿大夫裴叔則能清言常曰與樂君言覺其簡至吾等皆煩世說同上成都王之起兵長沙王猜廣廣曰寧以一女而易五男乂猶疑之遂以憂卒世說言語篇注阮咸咸行已多違禮度濤舉以為吏部郎世祖不許世說賞譽篇注書鈔三十三阮孚字遙集陳留人咸第二子也少有智調而無儁異累遷侍中吏部尚書廣州刺史世說雅量篇注王湛濟有人倫鑒識其雅俗是非少所優潤見湛嘆服其德宇時人謂湛上方山濤不足下比魏舒有餘湛聞之曰欲以我處季孟之間乎世說賞譽篇注歐陽建字堅石渤海人有才藻時人為之語曰渤海赫赫歐陽堅石初建為馮翊太守趙王倫為征西將軍孫秀為腹心撓亂關中建每匡正由是有隙世說仇隙篇注文選歐陽堅石臨終詩注引建字堅石孫秀妻蒯氏蒯氏襄陽人祖良吏部尚書父鈞南陽太守世說惑溺篇注孫秀倫篡位秀為中書令事皆決於秀為齊王所誅世說賢媛篇注陸機機字士衡吳郡人祖遜吳丞相父抗大司馬機與弟雲並有儁才司空張華見而悅之曰平吳之利在獲二儁世說言語篇注潘岳岳字安仁滎陽人夙以才穎發名善屬文清綺絕世蔡邕未能過也仕至黃門侍郎為孫秀所害世說文學篇注孫楚楚驃騎將軍資之孫南陽太守宏之子鄉人王濟豪俊公子為本州太中正訪問楚為鄉里品狀濟曰此人非鄉評所能名吾自狀之曰天才英特亮拔不群仕至馮翊太守世說言語篇注劉昶昶為人通達仕至兗州刺史世說任誕篇注周處處仕晉為御史中丞多所彈糾氐人齊萬年反乃令處拒萬年伏波孫秀欲表處母老處曰忠孝之道何當得兩全乃進戰斬首萬計弦絕矢盡左右勸退處曰此是我授命之日遂戰而沒世說自新篇注劉輿字慶孫中山人有豪俠才算善交結為范陽王虓所暱虓薨太傅召之大相委仗用為長史世說雅量篇注劉輿太傅將召劉輿或曰輿猶膩也近將汙人太傅疑而禦之輿乃密視天下兵簿諸屯戎及倉庫處所人穀多少牛馬器械水陸地形皆默識之是時軍國多事每會議事自潘滔以下皆不知所對輿便屈指籌計所發兵仗處所糧廩運轉事無疑滯於是太傅遂委仗之世說賞譽篇注鄧攸攸字伯道平陽襄人七歲喪父母及祖父母持重九年性清慎平簡世說德行篇注鄧攸既棄子遂無復繼嗣為有識傷惜世說賞譽篇注祖逖逖與司空劉琨俱以豪雄著名年二十四與琨同辟司州主簿情好綢繆共被而寢中夜聞雞鳴俱起曰此非惡聲也每語世事則中宵起坐相謂曰若四海鼎沸豪傑共起吾與足下相避中原耳為汝南太守值京師傾覆率流民數百家南渡行達泗口安東板為徐州刺史逖既有豪才嘗慷慨以中原為己任乃說中宗雪復神州之計拜為豫州刺史使自招募逖率部曲百餘家北渡江誓曰祖逖若不清中原而復濟此者有如大江攻城略地招懷義士屢摧石虎不敢復窺河南石勒為逖母墓置守吏劉琨與親舊書曰吾枕戈待旦志梟逆虜常恐祖生先我著鞭耳會其病卒先有妖星見豫州分逖曰此必為我也天未欲滅寇故耳贈車騎將軍世說賞譽篇注書鈔一百三十八陳補引祖逖為奮威將軍及渡江中流擊楫而誓曰逖不清中原而復濟者有如此水逖性通濟不拘小節又賓從多是桀黠勇士逖待之皆如子弟永嘉中流民以萬數揚土大飢賓客攻剽逖輒擁護全衛談者以此少之故久不得調世說任誕篇注王導王導接誘應會少有牾者雖疏交常賓一見多輸寫㹌誠自謂導所遇同之舊暱世說政事篇注蘇峻既誅大事克平之後都邑殘荒溫嶠議徙都豫章以及豐全朝士及三吳豪傑謂可遷都會稽導獨謂不宜遷都建業往之秣陵古者既有帝王所治之表又孫仲謀劉玄德俱謂是王者之宅今雖凋殘宜修勞來旋定之道鎮靜群情且百堵皆作何患不克復乎終至康寧導之策也世說言語篇注陶侃侃父丹娶新淦湛氏女女生侃湛虔恭有智算以陶氏貧賤紡績以資給侃使交結勝己侃少為尋陽吏鄱陽孝廉范逵嘗過侃宿時大雪侃家無草湛徹所臥薦剉給陰截髮賣以供調逵聞之嘆息逵去侃追送之逵曰豈欲仕乎侃曰有仕郡意逵曰當相談致過廬江向太守張夔稱之召補吏舉孝廉除郎中時豫章顧榮或責羊晫曰君奈何與小人同輿晫曰此寒俊也世說賢媛篇注侃練核庶事勤務稼穡雖戎陳武士皆勸厲之有奉饋者皆問其所由若力役所致懽喜慰賜若他所得則呵辱還之是以軍民勤於農稼家給人足性纖密好問頗類趙廣漢嘗課營種柳都尉夏施盜拔武昌郡西門所種侃後自出駐車施門問此是武昌西門柳何以盜之施惶怖首伏三軍稱其明察侃動而整自強不息又好督勸於人嘗云民生在勤大禹聖人猶惜寸陰至於凡俗當惜分陰豈可遊逸生無益於時死無聞於後是自棄也又老莊浮華非先王之法言而不敢行君子當正其衣冠攝以威儀何有亂頭養望自謂宏達耶世說政事篇注溫嶠一敦將至嶠燒朱雀橋以止其兵世說捷悟篇注周顗顗有風流才氣少知名正體嶷然儕輩不敢媟也汝南賁泰淵通清操之士嘗嘆曰汝潁固多賢士自頃陵遲雅道殆衰今復見周伯仁將袪舊風清我邦族矣舉寒素累遷尚書僕射為王敦所害世說言語篇注又賞譽篇注引顗正體嶷然雖一時儕類皆無敢媟近書鈔六十九陳補引同賞譽篇注末有辟為太尉參軍六字王敦既下六軍敗績顗長史郝嘏及左右文武勸顗避難顗曰吾備位大臣朝廷頃撓豈可草間偷活投身胡虜耶乃與朝士詣敦敦曰近日戰有餘力否對曰恨力不足豈有餘耶世說方正篇注初顗以雅望獲海內盛名後屢以酒失庾亮曰周侯末年可謂鳳德之衰也世說任誕篇注周嵩嵩事佛臨刑猶誦佛經世說方正篇注劉超超字世踰琅邪人漢成陽景王六世孫封臨沂慈鄉侯遂家焉父徵為琅邪國上將軍超為縣小吏稍遷記室掾安東舍人忠清慎密為中宗所拔自以職在中書絕不與人交關書疏閉門不通賓客家無擔石之儲討王敦有功封零陽伯為義興太守而受拜及往還朝莫有知者其慎默如此遷右衛大將軍世說政事篇注王敦敦少稱高率通朗有鑒裁世說豪爽篇注王應應字安期含子也敦無子養為嗣以為武衛將軍用為副貳伏誅世說識鑒篇注錢鳳鳳字世儀吳嘉興尉子也奸慝好利為敦鎧曹參軍知敦有不臣心因進說敦敗伏誅世說假譎篇注沈充充字士居吳興人少好兵詔事王敦敦克京邑以充為車騎將軍領吳國內史明帝伐王敦充率眾就王含謂其妻曰男兒不建豹尾不復歸矣敦死充將吳儒斬首於京師世說規箴篇注張茂孔敬康丁世康張偉康俱著名時謂會稽三康偉康名茂嘗夢得大象以問萬雅雅曰君當為大郡而不善也象大獸也取其音狩故為大郡然象以齒喪身後為吳郡果為沈充所殺世說品藻篇注謝鯤字幼輿父衡晉碩儒鯤性通簡好老易善音樂以琴書為業避亂江東為豫章太守王敦引為文學世說文學篇注謝鯤鯤為豫章太守王敦將肆逆以鯤有時望逼與俱行既克京邑將旋武昌鯤曰不就朝覲懼天下私議也敦曰君能保無變乎對曰鯤近日入覲主上側席遲得見公宮省穆然必無不虞之慮公若入朝鯤請侍從敦曰正復殺君等數百何損於時遂不朝而去世說規咸篇注鯤隨王敦下人朝見太子於東宮語及夕太子從容問鯤曰論者以君方庾亮自論孰愈對曰宗廟之美百官之富臣不如亮縱意邱壑自謂過之世說品藻篇注庾顗庾顗字子嵩潁川人侍中峻第三子恢擴有度量自謂是老莊之徒曰昔未讀此書意嘗謂至理如此今見之正與人意暗同仕至豫州長史世說文學篇注顗頹然淵放莫有動其聽者世說賞譽篇注顗為太傅從事中郎世說同上顗永嘉中為石勒所害先是顗見王室多難知終嬰其禍乃作意賦以寄懷世說文學篇注初王澄有通朗稱而輕薄無行兄夷甫有盛名時人許以人倫鑒識嘗為天下士目曰阿平第一嵩第二處仲第三顗以澄敦莫己若也及澄喪敦敗顗世譽如初世說品藻篇注王澄王澄為荊州群賊並起乃奔豫章而恃其宿名猶陵侮敦敦使勇士路戎等搤而殺之世說方正篇注潘滔字陽仲滎陽人太常尼從子也有文學才識永嘉末為河南尹遇害世說鑒識篇注潘滔敦為太子舍人與滔同僚世說同上桓溫溫以永和二年率所領七千餘人伐蜀拜表輒行世說言語篇注庾亮字元規潁川鄢陵人明穆皇后長兄也淵雅有德量時人方之夏侯太初陳長文之倫待從父琛避地會稽端拱嶷然郡人嚴憚之接之者數人而已累遷征西大將軍荊州刺史世說德行篇注庾亮蘇峻作逆詔亮都督征討戰於建陽門外王師敗績亮於陳攜二弟奔溫嶠世說雅量篇注是時成帝在襁褓太后臨朝中書令庾亮以元舅輔政欲以風軌格政繩御四海而峻擁兵近甸為逋逃藪亮圖召峻王導卞壼並不欲亮曰蘇峻豺狼終為禍亂晁錯所謂削亦反不削亦反遂下優詔以大司農徵之峻曰庾亮欲誘殺我也遂克京邑平南溫嶠聞亂號泣登舟遣參軍王愆期推征西陶侃為盟主俱赴京師時亮敗績奔嶠人皆尤而少之嶠愈相崇重分兵以配給之世說假譎篇注庾冰庾冰字季堅太尉亮之弟也少有檢操兄亮常器之曰吾家晏平仲累遷車騎將軍荊州刺史世說方正篇注初顯宗臨崩庾冰議立長君何充謂宜奉皇子爭之不得充不自安求處外任及冰出鎮武昌充自京馳還言於帝曰冰不宜出昔年陛下龍飛使晉德再隆者冰之勳也臣無與焉世說同上庾翼翼率眾入沔將謀伐狄既至襄陽狄尚強未可決戰會康帝崩兄冰薨留長子方之守襄陽自馳還夏口世說排調篇注何充字次道廬江人思韻淹通有文義才情累遷會稽內史侍中驃騎將軍揚州刺史贈司徒世說政事篇注何充何充與王濛劉惔好尚不同由此見譏於當世世說同上充所暱庸雜以此損名世說品藻篇注充導妻姊之子明穆皇后之妹夫也思韻淹濟有文義才情導深器之由是有美譽遂歷顯位導有副貳已使繼相意故屢顯此旨於上下世說賞譽篇注何充性好佛道崇修佛寺供給沙門以百數久在揚州徵役吏民功賞萬計是以為遐邇所譏充弟準亦精勤惟讀佛經營治寺廟而已矣世說排調篇注蘇峻峻率眾二萬濟自橫江至於蔣山王師敗績世說方正篇注蘇峻自姑孰至於石頭逼遷天子峻以倉屋為宮使人守衛世說容止篇注任讓讓樂安人諸任之後隨蘇峻作亂世說政事篇注匡術匡術為阜陵令逃亡無行庾亮徵蘇峻術勸峻誅亮遂與峻同反後以宛城降世說方正篇注賈寧寧字建寧長樂人賈氏孽子也初自結於王應諸葛瑤應敗後遊吳會吳人咸侮辱之聞京師亂馳出投蘇峻峻甚暱之以為謀主及峻聞義軍起自姑孰屯於石頭是寧之計峻敗先降仕至新安太守世說賞譽篇注王述述少貧約簞瓢陋巷不求聞達由是為有識所重世說賞譽篇注述體道精粹簡遺靜正怡然自足不交非類雖群英紛紛俊乂交馳述獨蔑然曾不羨慕由是名譽久蘊世說同上苟羨苟羨字令則潁川人光祿大夫崧之子也清和有識裁少以主婿為駙馬都尉是時殷浩參謀百揆引羨為援頻蒞義興吳郡超拔北中郎將徐州刺史以蕃屏焉世說言語篇注杜乂字弘治京北人祖預父錫有譽前朝乂少有令名仕丹陽丞蚤卒成帝納乂女為后世說賞譽篇注褚裒字季野河南陽翟人祖䂮安東將軍父治武昌太守裒少有簡貴之風沖默之稱累遷江州刺史贈侍中太尉世說德行篇注褚裒裒簡穆有器識故為彝所重也世說賞譽篇注充之卒議者謂太后父褚裒宜乘朝政裒自丹徒入朝吏部尚書劉遐勸裒曰會稽王令德國之周公也足下宜以大政付之裒長史王胡之亦勸歸藩於是固辭歸京世說言語篇注謝尚謝尚字仁祖陳郡人鯤之子也齠齔喪兄哀慟過人及遭父喪溫嶠唁之尚號叫極哀既而收涕告訴有異常兒嶠奇之由是知名仕至鎮西將軍豫州刺史世說言語篇注尚率易挺拔超悟令上也世說賞譽篇注案令字疑誤尚性通任善音樂世說任誕篇注又容止篇注引尚喜音樂郄愔大司馬將討慕容暉表求申勸平北將軍愔及袁真等嚴辦愔以羸疾求退詔大司馬領愔所任世說捷悟篇注殷浩浩喜以通和接物也世說賞譽篇注初浩以中軍將軍鎮壽陽羌姚襄上書歸降後有罪浩陰圖誅之會關中有變苻建死浩偽率軍而行云修復山陵襄前驅恐遂反軍至山桑聞襄將至棄輜重馳保譙襄至據山桑焚其舟實至壽陽略流民而還浩士卒多叛征西溫乃上表黜浩撫軍大將軍奏免浩除名為民浩馳還謝罪既而遷於東陽信安縣世說黜免篇注羅友友字它仁襄陽人少好學不持節檢性嗜酒當其所遇不擇士庶又好伺人祠往乞餘食雖復營室壚署不以為羞桓溫嘗責之云君太不逮須食何不就身求乃至於此友傲然不屑荅曰就公乞食今乃可得明日已復無溫大笑之始仕荊州後在溫府以家貧乞祿溫雖以才學遇之而謂其誕肆非治民才許而不用後同府人有得郡者溫為席起別友至尤晚問之友答曰民性飲道嗜味昨奉教旨乃是首旦出門於中途逢一鬼大見揶揄云我只見汝送人作郡何以不見人送汝作郡民始怖終慚回還以解不覺成淹緩之罪溫雖笑其滑稽而頗愧焉後以為襄陽太守累遷廣益二州刺史在藩舉其大綱不存小察甚為吏民所安悅薨於益州世說任誕篇注袁宏宏嘗與王洵伏滔同侍溫坐溫令滔讀其賦至致傷於天下於此改韻云此韻所詠慨深千載今於天下之後便移韻於寫送之致如為未盡滔乃云得益寫一句或當小勝桓公語宏卿試思益之宏應聲而益王伏稱善世說文學篇注翟湯字道淵南陽人漢方進之後也篤行任素義讓廉潔饋贈一無所受值亂多寇聞湯名皆不敢犯世說棲逸篇注陳逵逵為西中郎將領淮南太守戍歷陽世說豪爽篇注劉恢恢尚廬陵長公主名南弟世說排調篇注七賢于時風譽扇於海內至於今詠之世說任誕篇竹林七賢注傖吳人以中州人為傖世說雅量篇注一切經音義卷十六劉聰聰一名載字玄明屠各人父淵因亂起兵死聰嗣業世說假譎篇注已上世說注杜預杜預造河橋於富平津水經河水注初學記八王衍晉太傅東海王越之東奔也石勒追之燌尸於此數十萬眾歛手受害勒縱騎圍射尸積如山王夷甫死焉余謂俊者所以智勝群情辨者所以文身袪惑夷甫雖體荷雋令口擅雌黃汙辱君親獲罪羯勒史官方之華王諒為褒矣水經渠水注沙水東逕寧平縣故城下引裴秀裴秀有風操十餘歲時人為之語曰後進領袖有裴秀文選任彥升為蕭揚州作薦士表注劉寔字子真平原人文選干令升晉紀總論注阮籍何曾於太祖坐謂阮籍曰卿任性放蕩敗禮傷教若不革變王憲豈得相容謂太祖宜投之四裔太祖曰此賢素羸君當恕之文選稽叔夜與山巨源絕交書注阮籍嫂嘗歸家籍相見與別或以禮譏之籍曰禮豈為我輩設耶文選顏延年五君詠注稽康稽康性不偶俗文選顏延年五君詠又顏延年陶徵士誄注王衍王衍字夷甫能言於意有不安者輒更易之時號口中雌黃文選劉孝標廣絕交論注王夷甫論曰夫芝蘭之不與茨棘俱植鸞鳳之不與梟鴞同棲天理固然易在曉悟文選劉孝標辯命論注傅咸司隸校尉傅咸勁直正厲果於從政彈奏百寮王戎多不見從文選干令升晉紀總論注應貞散騎常侍應貞詩最美文選應吉甫晉武帝華林園集詩注張悛字士然吳國人也元康中吳令謝詢表為孫氏置守冢人悛為其文詔從之文選張士然為吳令謝詢求為諸孫置守冢人表注張悛字士然少以文章與陸機友善文選陸士衡荅士然詩注謝詢河東人終於吳令文選張士然為吳令謝詢求為諸孫置守冢人表注孟觀孟觀為建威將軍擊氐羌於中亭大破之文選潘安仁關中詩注盧播振威盧播伐萬年文選潘安仁關中詩注傅隆傅隆議曰其總章伎即古之女樂文選陸士龍為顧彥先贈婦詩注劉弘劉弘顧望除名為民文選任彥昇為齊明帝讓宣城郡公第一表注應璩應璩作五言詩百三十篇言時事頗有補益世多傳之文選應休璉百一詩注劉曜劉曜入於京都六宮幽辱征西將軍南陽王模出降以模妃劉氏賜胡張平為妻文選干令升晉紀總論注已上俱文選注陸機五等論曰夫體國經野先王所慎創制垂基思隆後業然而經略不同長短異術五等之制始於黃唐郡縣之治創於秦漢得失成敗備在典謨是以其詳可得而言夫王者知帝業至重天下至廣廣不可以偏制重不可以獨任任重必於借力制廣終乎因人故設官分職所以輕其任也並建伍長所以弘其制也於是乎立其封疆之典裁其親疏之宜使萬國相維以成盤石之固宗庶雜居以定維城之業又有以見綏世之長御識人情之大方知其為人不如厚己利物不如圖身安上在乎悅下為己在乎利人是以分天下以厚樂而己得與之同憂饗天下以豐利而己得與之共害利博則恩篤樂遠則憂深故諸侯享食土之實萬國受傳世之祚夫然則南面之君各務其治九服之民知有定主上之子愛於是乎生下之禮信於是乎結世治足以敦風道衰足以禦暴故強毅之國不能擅一時之勢雄俊之民無所寄霸王之志然後國安由萬邦之思治主尊賴群后之圖身蓋三代所以直道四王所以垂業也故世及之制弊禍終乎七雄昔者成湯親照夏后之鑒公旦目涉商人之式文質相濟損益有物然五等之禮不革於時封畛之制有隆焉爾者豈玩二王之禍而闇經世之算乎固知百世非可懸禦善制不能無弊而侵弱之辱愈於殄祀土崩之困痛於陵夷也是以經始獲其多福慮終取其小禍非謂侯伯無可亂之符郡縣非致治之基也故國憂賴其釋位主弱憑於其翼戴及其承微積弊王室遂卑猶保名位祚遺後嗣皇統幽而不輟神器否而必存者豈非事勢使之然與降及亡秦棄道任術懲周之失自矜其得尋斧始於所庇制國昧於弱下國慶獨享其利主憂莫與共害雖速亡趨亂不必一道顛沛之釁實由孤立是蓋思五等之小怨忘萬國之大德知陵夷之可患闇土崩之為痛也周之不競有自來矣國乏令主十有餘世然片言勤王諸侯必應一朝震矜遠國先叛故強晉收其請隧之圖暴楚頓其觀鼎之志豈劉項之能闚關勝廣之敢號澤哉借使秦人因循周制雖則無道有共興亡其覆滅之禍豈在曩日漢矯秦枉大啟王侯境土踰溢不遵舊典故賈生憂其危晁錯痛其亂是以諸侯阻其國家之富憑其士民之力勢足者反疾土狹者逆遲六臣犯其弱綱七子衝其漏網皇祖夷於黥徒西京病於東帝是蓋過正之災而非建侯之累也逮至中葉忌其失節割削宗子有名無實天下曠然復襲亡秦之軌矣是以諸侯作威不忌萬邦新都襲漢易於拾遺也光武中興纂隆皇統而猶遵覆車之遺轍養喪家之宿疾僅及數世姦宄充斥卒有強臣專朝則天下風靡一夫縱橫而城地自夷豈不危哉在周之衰難興王室放命者七臣干位者三子嗣王委其九鼎凶族據其天邑鉦鼙震於閫宇鋒鏑流乎絳闕然禍止畿甸害不覃及天下晏然以治待亂是以宣王興於共和襄惠振於晉鄭豈若二漢陛闥暫擾而四海已沸孽臣朝入而九服夕亂哉遠惟王莽篡逆之事近覽董卓擅權之際億兆悼心愚智同痛然周以之存漢以之亡夫何故哉豈世乏曩時之臣士無匡合之志與蓋遠績屈於時異雄心挫於卑勢耳故烈士扼腕終委寇讎之手忠臣變節以助虐國之桀雖復時有鳩合同志以謀王室然上非奧主下皆市人師旅無先定之班君臣無相保之志是以義兵雲合無救劫殺之禍眾望未改而已見大漢之滅矣或以諸侯世位不必常全昏主暴君有時比迹故五等所以多亂今之牧守皆官方庸能雖或失之其得固多故郡縣易以為政治夫德之休明黜陟日用長率連屬咸述其職而淫昏之君無所容過何則不治哉故先代有以之興矣苟或衰陵百度自悖鬻官之吏以貨准才則貪殘之萌皆群后也安在其不亂哉故後有以之廢矣且要而言之五等之君為己思治郡縣之長為利圖物何以徵之蓋企及進取仕子之常志修己安民良士之所希及夫進取之情銳安民之譽遲是故侵百姓以利己者在位所不憚損實事以養名者官長所夙夜也君無卒歲之圖臣挾一時之志五等則不然知國為己土眾皆我民民安己受其利國傷家嬰其病故前人欲以垂後後嗣思其堂構為上無苟且之心群下知膠固之義使其竝賢居政則功有厚薄而兩愚處亂則過有淺深然則八代之制幾可以一理貫秦漢之典殆可以一言蔽矣群書治要三十引孫盛陽秋載機五等論皇甫陶秦始八年帝與右將軍皇甫陶論事陶固執所論與帝爭言散騎侍郎鄭徽表求治罪詔曰讜言謇諤直意盡辭所望於左右也人主常以阿媚為患豈以爭臣為損乎陶所執不諐此義而徽越職奏之豈朕意乎乃免徽官也群書治要卷二十九注已上群書治要高祖宣帝初宣王勒兵從闕下趣武庫當曹爽門人逼住爽妻劉怖出至廳事謂帳下守督嚴世曰公在外今兵起如何督曰夫人勿憂乃上門樓引弩注射箭將欲發孫謙在後牽止之曰天下事未可知如此者三宣王遂得過去書鈔一百二十五世祖武帝武帝改營太廟南致荊州之木西採華山之石鑄銅柱十二塗以黃金鏤以百物填以丹青綴以珠玉書鈔八十七孝惠帝惠帝詔曰天禍晉祚家嗣莫繼鸞軫弗御禁軍莫衛書鈔一百四十一惠帝元康元年洛中謠曰南風烈烈吹黃沙遙望魯國鬱嵯峨書鈔一百五十九中宗元帝中宗性簡儉沖素有司嘗奏太極殿廣室施絳帳帝曰漢文集上書皂囊為帷遂令冬施青布夏施青練帷帳書鈔一百三十三孝宗穆帝穆帝永和元年皇太后設紗帷於殿擁帝朝群臣書鈔一百三十二初學記二十五引穆帝皇太后設紗帷於太極殿孝武帝孝武好覽文藝敕著作郎徐野民料簡四部書凡三萬六千卷書鈔五十七武悼楊皇后廢為庶人賜死金墉城書鈔二十六惠賈皇后絕太后膳賜太子酒書鈔二十六唐彬唐彬為治中別駕忠肅公亮匡救違闕盡規誨以納善不顯諫以自彰當朝正色焉書鈔七十三陳補孫秀孫秀為趙王倫侍中劉弘為琅邪內史秀干倫遂為所信弘謂人曰孫秀校才其志難滿書鈔七十荀邃字道玄喜談論解音樂後晉賢莫逮驃騎將軍長沙王以為參軍書鈔六十九溫嶠溫嶠字太真太寧初手詔曰卿既以令望中允之懷著於周旋且文清而旨遠宜居機密今以卿為中書令書鈔五十七郭舒郭舒為荊州別駕諫刺史王澄宜撫養文武簡練士卒以備不虞不可輕佻書鈔七十二王洽王洽拜領軍尋加中書令固讓表疏十上穆帝詔曰敬和清裁貴令昔為中書郎吾時尚小數呼見意甚親之今所以用為令既機任須才且欲時時相見共講文章待以友臣之義豈便任國之大事耶宜催洽令拜固讓遂不受書鈔五十七袁宏袁宏字彥伯長於作賦為大司馬桓溫府記室書鈔六十九張惲梁國張惲字義元為郡吏入值太守圍棋投札於地惲曰知府君患風取以支戶太守輟棋令坐書鈔一百四御覽六百六戶作吳誤孫和大長秋孫和上書求以妾為妻免官禁錮書鈔五十九石勒石勒偽事王浚浚遺勒麈尾勒為不執置之於壁朝拜之云見王公所賜如見公也書鈔一百三十御覽七百三石虎永和八年冉閔大將軍蔣幹以傳國璽付河南太守戴施獻之百僚皆賀璽光照洞徹上盤螭文隱起曰昊天之命皇帝壽昌蓋秦璽也石虎刻其旁曰天命石氏書鈔一百三十一後漢書輿服志下注引無永和八年四字文曰作書曰蓋秦璽也作秦舊璽也無末十字已上俱書鈔世祖武帝武帝令曰殿前及武帷織成帷不須施也初學記二十五御覽七百無及武帷三字王獻之王珉王獻之為中書令獻之少而標邁不循常貫為一時風流之冠獻之卒以王珉為中書令世謂之大王令小王令也珉父洽又嘗為此官珉復繼之時人以為奕世令初學記十一簡文帝桓溫始以雄盛入輔繼以廢立帝雖登祚內不自安初熒惑入太微尋廢海西公至是熒惑猶在太微帝惡之謂郄超曰命之修短大所不計故無復往日事邪超云大司馬溫方內固社稷外布經略非常之事臣以百口保之超假還東帝謂之曰致意尊公家國之事遂至於此由吾不能以道匡樹思患豫防媿嘆之深何能言喻又誦庾闡詩云士痛朝危臣哀主辱淚下沾衣漣如相續藝文十二晉成帝咸康八年穀城縣民留珪夜見門內有光取得玉鼎一圍四寸廬江太守以獻藝文九十九劉禪司馬文王問劉禪曰頗思蜀否禪曰此間樂不思蜀也卻正見禪曰若王後問宜泣以對會王復問禪曰先人墳墓遠在隴蜀乃心西悲無日不思因閉目王曰何以似卻正語禪驚視曰誠如尊命藝文三十五王褒王褒母性畏雷及母死每雷震輒就墓側啟曰褒在此褒在此藝文二王敦王敦敗京都之後夢白犬自天而下噬之藝文九十四桓溫桓溫入蜀聞有善星者夜執其手於星下問國祚修短星人曰太微紫微文昌三宮氣候決無虞五十年外不論耳溫不悅送絹一匹錢五千與之星人詣主簿習鑿齒曰今受旨自裁乞命為標揭棺木問其故曰賜絹命僕自裁乞錢以買棺故知之耳鑿齒曰君幾誤死君聞子知星宿有不覆之義乎絹以戲君錢供資糧是聽君去耳星人喜以言詣溫溫笑曰君三十年看儒書不如一詣習主簿也藝文八十五世祖武帝太康五年龍見武庫井中帝觀之有喜色百官將賀劉役以為不祥孫楚上事曰武庫井中有二龍群官或謂之徵祥而稱賀有謂之非祥無所賀可謂楚既失之齊亦未為得也而龍守鱗翼潛於重淵或仰攀雲漢遊於蒼昊而今蟠於坎井同殂於蛙蝦豈獨管庫之士或有隱伏期役之賢沒於行伍故白龍見光景有所感帝邪開元占經一百二十武帝太康七年正月甲寅朔日有蝕之乙卯又蝕劉向洪範傳曰日之為異莫重於蝕故春秋日蝕則書之也日蝕者下淩上臣侵君之象也日蝕數者其亂象神者亂亦稀占經九末有譌誤中宗元帝建武元年三日並出觀臺令史諫章曰天下其三分乎三日並見於房心下不出一年天下亂有裂地為三州者占經六御覽四引建武元年三日並出孝武帝孝武太元十一年六月甲午歲星晝見在胃占曰魯有兵臣強十二年慕容垂寇河東翟遼使子寇陳項朱序討平之占經二十三太元十三年十一月戊子辰星入月占曰春多大水冬有大雷牛馬凍死米必大貴不出百日占經十三符堅孝武寧康二年二月丙午太白犯歲星太元元年九月元帥符堅屠涼州据刺史西平侯張天錫冬十月車騎桓伊遣軍涼州淮泗以救涼州又發二州員吏籍流民悉置淮南太元五年辛卯歲星與太白相犯於是年十二月元帥符堅圍襄陽占經二十符堅未敗時長安市鬼夜哭一月乃止占經一百十三御覽八百八十三客星入軫大風揚沙中兵大起占經八十一已上占經陶潛陶潛九月九日無酒宅邊摘菊盈把望見白衣人至乃王弘送酒便飲醉而歸白帖九月九日高祖宣帝宣帝初不欲屈節曹氏辭以風疾不能起魏武使人往微刺之帝堅臥不動御覽七百四十三高祖伐公孫淵過本縣賜牛酒穀帛郡守典農會暮次父老故舊讌飲高祖作歌曰天地開闢日月重光今遭際會奉辭遐方將掃逋穢還過故鄉肅清萬里總齊八荒告成歸老待罪無陽御覽五百七十書鈔十引高祖伐公孫淵肅清萬里諸葛武侯杖二十以上親決宣王聞之喜曰吾無憂矣御覽六百五十世宗景帝景帝有目疾文鴦之來攻驚而目出懼六軍恐蒙以被痛甚齧被破御覽七百七世祖武帝泰始四年七月立常平倉豐則糴儉則糶以利民也御覽一百九十有司奏依舊調房子雎陽綿武帝不許御覽八百十九又八百十七引無房子雎陽四字綿作編絹武帝時有司奏御牛青絲靷斷詔可以青麻代之御覽八百九十八又八百十四引御牛青絲靷斷作以青絲為牛靷詔下無可字武帝時御府丞蕭譚承徐修儀疏作漆畫銀帶粉盌詔殺之御覽七百六十又七百五十八引府丞作府令修作循銀帶粉盌作銀槃孝惠帝永興元年河間王顒表拜成都王穎為皇太弟司空王戎高密王簡平昌公模等以大駕北征廢皇太弟穎立豫章王熾為皇太弟御覽一百四十九惠帝崩由食餅也御覽八百六十孝穆帝懷帝天姿清劭少有聲名若遭承平之世足為守文佳主而繼惠帝擾亂之後東海專政祿去王室無幽厲之釁而蒙犬戎之禍悲矣御覽九十八書鈔十七引守文佳主懷帝陷於平陽劉聰加帝開府儀同三司會稽郡公引帝入醼謂帝曰卿為豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名久矣卿以所作樂府文示朕曰劉君聞君善詞賦試為看也朕與武子俱為聖德頌稱善者久之又引朕射於皇堂朕得十二籌卿與武子俱九籌卿又贈柘弓銀硯卿頗憶否帝曰安敢忘之恨爾日不得早識龍顏聰曰卿家骨肉何相殘之甚邪帝曰此殆非人事皇天意也大漢將興應乾受厤故為陛下自相驅耳且臣家若能奉武皇帝之業九族敦睦陛下何由得之聰甚有喜色御覽五百八十八引晉春秋中宗元帝昔泰始皇東遊望氣者云五百年後金陵之地有天子氣於是始皇改曰秣陵吳人以為孫權之表也盛案始皇遊歲至權僭號四百三十七年考之年數既不合校之基守又非倫豈應帝王之符而見兆於上代乎有晉金行奄君四海金陵之祥其在斯乎且秦政東遊至是五百二十六年所謂五百之後當有王者也又孫皓將亡吳郡臨蕪湖一夜草木自除於湖邊得石函中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者其中宗興五湖之徵歟太康三年建業有寇餘姚人任振以周易筮之曰寇已滅矣後三十八年揚州當有天子又太安中童謠曰五馬浮渡江一馬化為龍永嘉大亂王室淪覆唯琅邪曲陽汝南南頓彭城五王獲濟至是中宗登祚先是歲鎮熒惑太白四星聚於牛斗之閒五鐸又見於晉陵冥數玄感若合符節又初元石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒帝先飲佳者以毒者酖其將牛金而恭王妃夏侯氏通小吏牛欽而生元帝亦有符云御覽九十八又六十一引秦始皇東遊望氣者云五百年後金陵有天子氣於是始皇改曰秣陵塹北山以絕其勢建武元年虹長竟天御覽十四肅宗明帝明帝文武鑒斷初在東宮敬禮賢士昵近明德自王導庾亮溫嶠桓彝阮放皆見親侍分好綢繆雅好辭章談論辯明理義與二三君子並著時論粲然可觀於時東宮號為多士王敦既平思求民瘼詔尚書令僕射尚書曰吾飢於飡真言渴於求亮正想諸君達此懷矣予違汝弼堯舜之相君臣吾雖虛闇度不距逆耳之談稷契之任諸君居之矣望共勗之御覽九十八書鈔七引明帝文武鑒斷孝宗穆帝升平四年鳳皇將九子見鄖鄉之豐城冬復見眾鳥從之御覽九百十五孝武帝初太宗諸子繼夭諸姬絕孕令扈謙卜繇云後房當有女誕三男一女終大盛於是盡出後宮諸婢悉見之織坊中有一人色黑宮人謂之崑崙相者驚曰此是也帝以大計幸之生烈宗御覽三百六十平原王幹齊王冏輔政士以牛酒郊勞平原王幹獨齎百錢於懷賀之御覽一百五十一又八百三十五引朝士以牛酒勞齊王冏平原王幹獨齎百錢平原王幹陰雨則乘犢車而入乘露車或問其故曰露者宜內也御覽七百七十五桓範司農桓範字元則出奔曹爽云大司農印在吾手中所在得開倉而食御覽二百三十三王祥晉文帝進號為王太尉王祥獨長揖王謂祥曰今日然後知君見顧之重也御覽五百四十三陳群陳群為吏部尚書制九格登用皆由於中正考之簿世然後授任御覽二百十四荀粲荀粲亡時年二十九性簡實不能與常人交接所交者皆一時俊傑至葬夕赴者裁十餘人皆同時知名士也哭之感動路人御覽五百五十四書鈔九十二陳補荀粲字奉倩常曰婦人者才智不足論自宜以色為主驃騎將軍曹洪女有美色粲於是聘焉容服帷帳甚麗專房宴寢數年婦偶病亡未殯傅嘏往唁之粲不哭神傷曰佳人難再得痛悼不已歲餘亦亡御覽三百八十張華晉張華有文雅之才晉儀禮釐革制度敕有司給筆札多所損益御覽六百六李善李善乞老以為光祿大夫門施行馬御覽二百四十三魏舒魏舒適主人俄聞車馬之聲問曰男女從者入反曰男也年十五以兵死又問寢者誰曰魏公舒默然謝之御覽三百六十一魏舒子亡唯有一息足堪負荷所以散其憂懷給賜道車四望御覽七百七十五事類賦十六引魏舒子亡詔賜陽燧四望車使出入觀望散其哀懷阮籍晉文帝親阮籍恒與譚戲任其所欲不迫以職事籍從容嘗言曰平生曾遊東平樂其土風願得為東平太守文帝大悅即從其意籍便騎驢到郡至皆壞府舍諸壁鄣使內外相望然籍教令清整當留十餘日便乘驢去御覽九百一朱整朱整少有名行官至中書監魏禪晉使整與中書令劉良共為詔世祖踐祚權即用之御覽二百二十羊冉廬陵太守羊冉疑郡人簡良等為賊殺一百九十人徒謫百有餘人有司奏冉罪死以景獻皇后有屬八議帝曰此古人所無何八議之有乎未忍肆之市朝其賜命獄所琅邪王太妃山氏冉之甥也詣闕請命丞相以太妃為言於是簡死罪既出有疾見簡良為祟旬日而卒御覽二百六十二孫秀孫秀降賜雲母車御覽八百八馬隆馬隆討涼州虜隆募限腰引弩四十六鈞弓限四鈞以上隆捶檦懸弓弩檦側閱試自旦至中得三千五百人御覽三百四十八溫嶠溫嶠上書曰臣才短學淺文義不通中書之職酬對無方斟酌重輕豈惟文疏而己自非望士良才何可妄居斯位累辭得止御覽二百二十周訪王敦許周訪荊州又授梁州訪怒敦書喻之遺以盌訪投盌於地御覽七百六十甘卓字季思察孝廉為吳王晏常侍御覽二百四十八卞壼義熙九年群盜發卞壼墓剖棺虜掠壼尸僵鬚髮蒼白面如生人兩手悉拳爪甲乃長穿達手背焉御覽三百七十王彬周顗既遇害王彬哭之甚哀敦怒曰周伯仁凡人遇汝何為如此彬曰伯仁長者君之親友在朝雖無謇諤亦無所阿黨且加之極刑何痛如之左右見敦盛怒竊勸跪謝彬曰腳痛不能跪拜敦復曰腳痛孰與頭痛咸為失色御覽三百七十二王胡之王胡之善於投壺言手熟閉目御覽七百五十三庾冰荊州刺史庾冰中子襲嘗貸官曹絹十疋冰怒撻之市絹還官御覽八百十七王洽王洽除中書令時年二十九將辭之從兄朗之遺書曰弟今二十九便居清顯要任敢不敬以先旨為弟啟義讓之路焉若弟年至四五十之間雖復朝令趨登公輔亦非吾所預況降此以還者耶洽遂不拜御覽二百二十車胤車胤字武子家貧讀書常不得油夏月則練襄盛數十螢以夜繼日御覽二十一事類賦四引無胤字二字董威輦董威輦常宿白社中時乞於市得殘碎絹結以自覆金帛袿錦則不肯受御覽八百十八董威輦潛遁去不知所之於其寢所得一石及詩二首御覽五十一事類賦七韓康伯韓康伯年四十九拜領軍疾病占候者云不宜此官固請徙之御覽二百三十九周延義興周延為左率轉尚書遷大將軍諮議參軍御覽二百三十八崔祖思清河崔祖思死家無餘財有書千卷上聞嗟嘆良久乃以葛屯穀五百斛賜其家曰葛屯亦吾之垣下令後世知其異御覽六百三十三引晉春秋顧愷之顧愷之尤好丹青嘗以一廚畫寄桓玄悉糊題其前玄乃發廚後而取之封題如舊以還之愷之見封題如初但失其畫直云妙達通靈變化而去猶人登仙也御覽七百十三王歡王歡耽學貧或人惠蒸餅一顆以充一日妻子常有菜色御覽八百六十劉裕劉裕平慕容超將鎮下邳聞盧循反何無忌敗乃還次山陽造揚子江問行人曰朝廷如何對曰劉公尚未至劉公若還無所憂也裕將濟而風急眾咸難之裕曰吾有天命風當自息如天不助覆溺何足可怯即令登舟舟移而風止御覽八百七十二韋敻晉陵人韋敻桓修令於坐相劉公仕宦當至州不敻云劉粗是有相人當不失邊州刺史既出私於裕曰卿大有貴相向不敢極言耳裕惡其言末略答曰卿狂言驗當為司馬義旗後數年見裕訴曰周成不負桐葉之信公不應忘司馬之言今不希鎮軍府聞護軍司馬缺願賜卒恩裕美而用之御覽二百四十八陳留王給陳留王碓一區御覽七百六十二區純衡陽區純甚有巧思造作木室作一婦人居其中人扣其戶婦人開門而出當戶再拜還入戶內閉戶又作鼠市四方丈餘有四門門中有木人縱四五鼠欲出門木人輒推門掩之門門如此鼠不得出又作指南車及木奴令舂穀作米中宗聞其巧詔補尚方左校御覽七百五十二又九百十一引太興中區純作鼠市四方丈餘開四門縱四五鼠於中欲出門木人輒以椎椎之肅慎肅慎土無鹽鐵御覽八百十三知幾知幾其神乎古人以為難交疏而吐誠今人以為難御覽四百六已上御覽符堅秦符堅剋襄陽獲習鑿齒釋道安時鑿齒足疾堅見之與語大悅歎曰昔晉平吳利在二陸今破南土獲士一人有半蓋刺其蹇也初鑿齒嘗造道安譚論自贊曰四海習鑿齒安應聲曰彌天釋道安咸以為清對太平廣記二百四十六引晉春秋孝武帝寧康二年九月九日上嘗講孝經謝安侍坐陸納卞耽執讀謝石袁虎執經車胤王溫摘句事類賦五謝敷會稽謝敷字慶緒隱若邪山初月犯少微星少微一名處士星時戴逵名著於敷時人憂之俄而敷死會稽人士嘲曰吳中高士求死不得死事類賦二肅慎蕭慎國武帝時及元帝中興皆來貢獻成帝時又通貢於石季龍曰每候牛馬向西南眠者三年矣是知大國所在故來事類賦二十二已上事類賦衛瓘大保淄陽侯衛瓘河東安邑人也瓘子恒恒子玠寰宇記河東道解州安邑縣楊駿惠帝永平元年殺太傅楊駿併父及子孫五人故吏潘岳等收葬之寰宇記河南道陜州靈寶縣賀循朱誕陳敏亂三吳知名士皆受爵祿賀循朱誕不辱其身寰宇記江南東道蘇州吳縣劉曜永嘉元年洛陽步廣里地陷有二鵝色黃蒼者飛沖天白者不能黃蒼雜胡夷之象劉曜以為己瑞築城以應之寰宇記河東道并州清源縣石勒司冀青雍蝗食茅草至盡石勒與蝗競取民禾河北百姓謂之胡蝗寰宇記河北道冀州信都縣秦淮秦淮是秦所鑿王導渡淮令郭璞筮之即此淮也未至方山有直瀆行三十許里寰宇記江南東道昇州江寧縣引孫盛晉春秋案此是約引之辭已上太平寰宇記元帝元帝登阼是歲鎮太白星等聚於牛女之間緯略王衍樂廣王夷甫樂廣俱宅心事外風流著稱唯王樂焉緯略三高貴鄉公高貴鄉公神明儁爽德音宣朗景王曰上何如主也鍾會對曰才同陳思武類太祖景王曰若如卿言社稷之福也說郛五十九引庾翼晉陽秋丁卯葬高貴鄉公於洛陽西北三十里瀍澗之濱下車數乘不設旌旐百姓相聚而觀之曰是前日所殺天子也或掩面而泣悲不自勝說郛同上謝安張華將死中台星拆太元中復還合太傅謝安為相所致也說郛五十九引庾翼晉陽秋袁宏袁宏字彥伯謝安賞其機捷辯速自吏部郎出為東陽郡乃祖之於冶亭時賢皆集安欲卒迫試之執手將別顧左右取一扇而贈之宏應聲曰輒當奉揚仁風慰彼黎庶合座歎其要捷說郛五十九引庾翼晉陽秋一切經音義四分律十六卷㱻下注云音翼唯晉陽秋有人姓姚名㱻作此字諸書所無案晉書載記後秦姚弋仲豈即姚㱻乎
