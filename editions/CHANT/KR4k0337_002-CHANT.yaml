body:
  text: 補遺愍帝愍帝在西京旱傷薦臻無注記年月也宋書五行志二謝尚尚善音樂裴子云丞相嘗曰堅石挈腳枕琵琶有天際想堅石尚小字世說容止篇注孝武帝孝武寧康元年七月乙未火犯軒轅大星二年正月大赦占經三十六孝武帝寧康二年九月甲子太白犯斗第五星三月丁未大赦天下也占經四十八符堅太元元年三月丁巳流星大如椀赤色尾長二丈起心星南五丈經積卒九月秦王符堅屠涼州擒刺史張天賜車騎桓沖屯田洙泗占經七十五刁彝孝武寧康元年九月癸巳火入太微掩西藩上將二年正月己酉北中郎將徐兗二州刺史刁彝薨占經三十六王彪孝武太元元年九月癸亥熒惑犯哭星二年八月王彪死占經三十七孝武太元二年七月己亥填星搖三年六月大水占經三十八馬咸寧八年有馬色如血自宣陽門直入殿前走出不知所之占經一百十八祖逖祖逖字士稚好俠每之田舍輒稱兄命散穀帛以贈貧者御覽四百七十三顧愷之顧愷之尤好丹青嘗以一廚畫寄桓玄悉糊題其前玄乃發廚後而取之封題如舊而還之愷之見封題如初但失其畫直云妙畫通神變化而去猶人登仙御覽七百十三
